<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SubHub</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <div class="logo justify-center">
                    <i class="ri-triangle-fill"></i> SubHub
                </div>
                <h2>Welcome Back</h2>
                <p class="text-muted">Enter your details to manage your subscriptions.</p>
            </div>
            <form action="index.html" class="auth-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="john@example.com" class="glass-input" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" class="glass-input" required>
                </div>
                <div class="auth-actions">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>
                <button type="submit" class="btn-primary w-full">Sign In</button>
            </form>
            <div class="auth-footer">
                <p class="text-muted">Don't have an account? <a href="register.html">Sign up</a></p>
            </div>
        </div>
    </div>
</body>
</html>
